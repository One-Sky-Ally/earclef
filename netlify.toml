[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# earclef.com is the primary domain (July 2026). Netlify was observed
# serving the netlify.app subdomain as 200 duplicate content rather
# than auto-redirecting, so the 301 is forced here.
[[redirects]]
  from = "https://earclef.netlify.app/*"
  to = "https://earclef.com/:splat"
  status = 301
  force = true
